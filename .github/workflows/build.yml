name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    name: Android APK (Release)
    if: github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'beta'
          cache: true

      - name: Create dummy keystore for CI
        run: |
          keytool -genkey -v \
            -keystore android/app/ci-keystore.jks \
            -alias ci \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass 12345678 \
            -keypass 12345678 \
            -dname "CN=CI, OU=CI, O=CI, L=CI, ST=CI, C=US"

          cat > android/key.properties << EOF
          storeFile=ci-keystore.jks
          keyAlias=ci
          keyPassword=12345678
          storePassword=12345678
          EOF

      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            flutter pub get && break || sleep 10
          done

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: proxypin-android-release
          path: build/app/outputs/flutter-apk/app-release.apk

  build-android-release:
    runs-on: ubuntu-latest
    name: Android AAB (Release)
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'beta'
          cache: true

      - name: Create dummy keystore for CI
        run: |
          keytool -genkey -v \
            -keystore android/app/ci-keystore.jks \
            -alias ci \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass 12345678 \
            -keypass 12345678 \
            -dname "CN=CI, OU=CI, O=CI, L=CI, ST=CI, C=US"

          cat > android/key.properties << EOF
          storeFile=ci-keystore.jks
          keyAlias=ci
          keyPassword=12345678
          storePassword=12345678
          EOF

      - name: Install dependencies
        run: |
          for i in 1 2 3; do
            flutter pub get && break || sleep 10
          done

      - name: Build appbundle (release)
        run: flutter build appbundle --release

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: proxypin-android-release
          path: build/app/outputs/bundle/release/app-release.aab
